<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Phishing IR Lab{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --green: #3fb950;
      --blue: #58a6ff;
      --orange: #f0883e;
      --red: #f85149;
      --yellow: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Consolas, monospace;
      margin: 0;
      min-height: 100vh;
    }
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .topbar h1 { color: var(--green); font-size: 1.1rem; margin: 0; }
    .topbar .meta { color: var(--muted); font-size: 0.8rem; }
    .topbar a { color: var(--blue); text-decoration: none; margin-left: 1rem; }
    .container { padding: 1.25rem 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
    }
    .card .label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .card .value { font-size: 1.6rem; font-weight: 600; margin-top: 0.25rem; }
    .card .sub { color: var(--muted); font-size: 0.72rem; margin-top: 0.2rem; }
    .value.critical { color: var(--red); }
    .value.high { color: var(--orange); }
    .value.ok { color: var(--green); }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .panel h2 {
      color: var(--green);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 0.75rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { border-bottom: 1px solid var(--border); padding: 0.55rem 0.6rem; text-align: left; }
    th { color: var(--muted); font-weight: 600; font-size: 0.72rem; text-transform: uppercase; }
    tbody tr { cursor: pointer; transition: background 0.15s; }
    tbody tr:hover { background: #21262d; }
    tbody tr.hidden { display: none; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      border: 1px solid var(--border);
    }
    .badge.high, .badge.critical { color: var(--red); border-color: #f8514966; }
    .badge.medium { color: var(--yellow); }
    .badge.open { color: var(--orange); }
    .badge.investigating { color: var(--blue); }
    .fail { color: var(--red); }
    .pass { color: var(--green); }
    .sev-HIGH, .sev-CRITICAL { color: var(--red); font-weight: 600; }
    .sev-MEDIUM { color: var(--yellow); }
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
      align-items: center;
    }
    .filter-bar input, .filter-bar select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85rem;
    }
    .filter-bar input { min-width: 200px; flex: 1; }
    .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .event-row td:first-child { color: var(--muted); white-space: nowrap; font-size: 0.78rem; }
    .mono { font-family: Consolas, monospace; font-size: 0.8rem; word-break: break-all; }
    .source-tag {
      background: var(--bg);
      color: var(--muted);
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-size: 0.68rem;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <div>
      <h1><span class="live-dot"></span>Phishing IR Lab — SOC Console</h1>
      <div class="meta">Data: {{ stats.log_source if stats is defined and stats else 'phishing_mail.log' }} · Host: mailserver01</div>
    </div>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/triage">Live Triage</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
